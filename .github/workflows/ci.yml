name: Python CI and PyPI

on:
  push:
    branches: [main]
    paths:
      - "niltest/**"
      - "tests/**"
      - "examples/**"
      - "pyproject.toml"
      - "PYPI.md"
      - ".github/workflows/ci.yml"
      - ".github/release.yml"
      - ".github/dependabot.yml"
  pull_request:
    paths:
      - "niltest/**"
      - "tests/**"
      - "examples/**"
      - "pyproject.toml"
      - "PYPI.md"
      - ".github/workflows/ci.yml"
      - ".github/release.yml"
      - ".github/dependabot.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: python-ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  ruff:
    name: Ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install -e ".[dev]"
      - run: ruff format --check .
      - run: ruff check .

  mypy:
    name: Mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install -e ".[dev]"
      - run: mypy niltest

  test:
    name: Tests (${{ matrix.os }}, Python ${{ matrix.python-version }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install -e ".[dev]"
      - run: python -m pytest --cov=niltest --cov-report=term-missing --cov-fail-under=90
      - run: niltest run examples.demo --language en

  package:
    name: Build distribution
    needs: [ruff, mypy, test]
    runs-on: ubuntu-latest
    outputs:
      slsa-subjects: ${{ steps.slsa-subjects.outputs.hashes }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install build twine
      - run: python -m build
      - run: python -m twine check dist/*
      - name: Record distribution digests for SLSA
        id: slsa-subjects
        shell: bash
        run: echo "hashes=$(sha256sum dist/* | base64 -w0)" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v4
        with:
          name: python-package
          path: dist/
          if-no-files-found: error

  pypi-version:
    name: Check PyPI version
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: package
    runs-on: ubuntu-latest
    outputs:
      should-publish: ${{ steps.version.outputs.should-publish }}
      local-version: ${{ steps.version.outputs.local-version }}
      pypi-version: ${{ steps.version.outputs.pypi-version }}
      prerelease: ${{ steps.version.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install packaging
      - name: Compare repository and PyPI versions
        id: version
        shell: python
        run: |
          import json
          import os
          import tomllib
          import urllib.error
          import urllib.request
          from pathlib import Path

          project = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))["project"]
          name = project["name"]
          local = project["version"]
          url = f"https://pypi.org/pypi/{name}/json"

          try:
              with urllib.request.urlopen(url, timeout=20) as response:
                  releases = json.load(response).get("releases", {})
          except urllib.error.HTTPError as error:
              if error.code != 404:
                  raise
              releases = {}

          from packaging.version import Version

          published = [Version(version) for version, files in releases.items() if files]
          latest = max(published) if published else None
          should_publish = latest is None or Version(local) > latest
          prerelease = Version(local).is_prerelease or Version(local).is_devrelease

          print(f"Repository version: {local}")
          print(f"Latest PyPI version: {latest or 'not published'}")
          print(f"Publish: {should_publish}")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"should-publish={str(should_publish).lower()}\n")
              output.write(f"local-version={local}\n")
              output.write(f"pypi-version={latest or 'none'}\n")
              output.write(f"prerelease={str(prerelease).lower()}\n")

  publish-pypi:
    name: Publish to PyPI
    if: needs.pypi-version.outputs.should-publish == 'true'
    needs: [package, pypi-version, attest-package, slsa-provenance]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/niltest/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: python-package
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true
          print-hash: true

  attest-package:
    name: Attest distributions
    if: needs.pypi-version.outputs.should-publish == 'true'
    needs: [package, pypi-version]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: python-package
          path: dist
      - name: Generate build provenance
        uses: actions/attest@v4
        with:
          subject-path: |
            dist/*.whl
            dist/*.tar.gz

  slsa-provenance:
    name: Generate SLSA Build Level 3 provenance
    if: needs.pypi-version.outputs.should-publish == 'true'
    needs: [package, pypi-version]
    permissions:
      actions: read
      contents: write
      id-token: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: ${{ needs.package.outputs.slsa-subjects }}

  release-github:
    name: Create GitHub Release
    if: needs.pypi-version.outputs.should-publish == 'true'
    needs: [package, pypi-version, publish-pypi, slsa-provenance]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: python-package
          path: dist
      - name: Download SLSA provenance
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.slsa-provenance.outputs.provenance-name }}
          path: provenance
      - name: Publish release, notes, and distributions
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.pypi-version.outputs.local-version }}
          target_commitish: ${{ github.sha }}
          name: niltest v${{ needs.pypi-version.outputs.local-version }}
          generate_release_notes: true
          prerelease: ${{ needs.pypi-version.outputs.prerelease }}
          make_latest: ${{ needs.pypi-version.outputs.prerelease == 'false' }}
          fail_on_unmatched_files: true
          files: |
            dist/*.whl
            dist/*.tar.gz
            provenance/*.intoto.jsonl
