name: Python CI and PyPI

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "niltest/**"
      - "tests/**"
      - "examples/**"
      - "pyproject.toml"
      - "PYPI.md"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "niltest/**"
      - "tests/**"
      - "examples/**"
      - "pyproject.toml"
      - "PYPI.md"
      - ".github/workflows/ci.yml"
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ruff:
    name: Ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install -e ".[dev]"
      - run: ruff format --check .
      - run: ruff check .

  mypy:
    name: Mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install -e ".[dev]"
      - run: mypy niltest

  test:
    name: Tests (${{ matrix.os }}, Python ${{ matrix.python-version }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install -e ".[dev]"
      - run: python -m pytest --cov=niltest --cov-report=term-missing --cov-fail-under=90
      - run: niltest run examples.demo --language en

  package:
    name: Build distribution
    needs: [ruff, mypy, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install build twine
      - run: python -m build
      - run: python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: python-package
          path: dist/
          if-no-files-found: error

  publish-pypi:
    name: Publish to PyPI
    if: github.event_name == 'release' && github.event.action == 'published'
    needs: package
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/niltest/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-package
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
