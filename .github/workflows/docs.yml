name: Docs build and Pages

on:
  push:
    branches: [main]
    paths:
      - "docs-site/**"
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "docs-site/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docs:
    name: Audit and build Astro docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.3"
      - run: bun install --frozen-lockfile
        working-directory: docs-site
      - run: bun audit
        working-directory: docs-site
      - run: bun run check
        working-directory: docs-site
      - run: bun run build
        working-directory: docs-site
      - name: Verify Pages entrypoints and static assets
        shell: bash
        run: |
          test -f docs-site/dist/index.html
          test -f docs-site/dist/docs/index.html
          test -d docs-site/dist/assets
      - uses: actions/upload-artifact@v7
        if: github.event_name != 'pull_request'
        with:
          name: built-docs
          path: docs-site/dist
          if-no-files-found: error

  deploy:
    name: Update pages branch
    if: github.event_name != 'pull_request'
    needs: docs
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: built-docs
          path: site
      - name: Create or update pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: pages
          publish_dir: ./site
          keep_files: false
